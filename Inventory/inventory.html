<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management App</title>
    <link rel="stylesheet" href="../Style/inventory.css">

</head>

<body>


    <!-- <button onclick="logout()">Logout</button> -->

    <div class="logo-container">
        <header class="Log-out">
            <a href="../index.html">Log Out</a>
        </header>

        <h1>Zenith Stock</h1>

        <!-- <div class="dashboard">
            <h3>Total Products: <span id="totalProducts">0</span></h3>
        </div> -->

        <div class="form-section">
            <input type="text" id="itemName" placeholder="Product Name">
            <input type="number" id="itemQty" placeholder="Quantity">
            <button onclick="addItem()">Add Item</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Product..." onkeyup="searchItem()">
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="inventoryTable"></tbody>

        </table>

    </div>
    <!-- <button link="../Bill/Bill.html">Billing</button> -->
    <!-- <button onclick="window.location.href='../Bill/Bill.html'">
        Billing
    </button> -->

    <!-- <a href="../Bill/Bill.html">
        <Button>Billing</Button></a> -->
    <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-database-compat.js"></script>


    <script src="../script/inventory.js"></script>

</body>


</html>
